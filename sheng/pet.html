<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌宠自定义 · 小圣的小窝 ✿</title>
  <meta name="description" content="挑选住在屏幕边的小家伙，打扮你的桌宠。" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/favicon-192.png" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- 飘落的花瓣层（JS 生成，尊重减少动态偏好） -->
  <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>

  <!-- 特效画布：粉色鼠标轨迹 + 飘雪 -->
  <canvas class="fx-canvas" id="fxCanvas" aria-hidden="true"></canvas>

  <!-- 桌宠：本页改完设置立刻能在边上看到它 -->
  <div class="pet" id="pet" data-state="idle" data-surface="floor" aria-hidden="true">
    <div class="pet__rot">
      <div class="pet__flip">
        <canvas class="pet__gl" id="petGL"></canvas>
      </div>
    </div>
    <div class="pet__bubble" id="petBubble"></div>
    <div class="pet__zzz" id="petZzz" hidden>💤</div>
  </div>

  <!-- 导航 -->
  <header class="nav" id="nav">
    <div class="nav__left">
      <div class="nav__header">
        <a class="nav__logo" href="index.html"><span class="nav__logo-mark">✿</span><span class="nav__logo-text">小圣的小窝</span></a>
        <button class="nav__collapse" id="navCollapse" aria-label="收起 / 展开侧边栏" title="收起 / 展开">
          <span class="nav__collapse-icon">«</span>
        </button>
      </div>
      <nav class="nav__links">
        <a href="index.html#likes"><span class="nav__icon">♥</span><span class="nav__text">喜好</span></a>
        <a href="index.html#corner"><span class="nav__icon">✦</span><span class="nav__text">小角落</span></a>
        <a href="index.html#contact"><span class="nav__icon">✉</span><span class="nav__text">联系</span></a>
        <a href="pet.html" aria-current="page"><span class="nav__icon">🐾</span><span class="nav__text">桌宠</span></a>
      </nav>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="切换明暗主题" title="切换主题">
      <span class="theme-toggle__icon">☾</span>
    </button>
  </header>

  <main id="top">
    <section class="section">
      <div class="container">
        <h1 class="section__title reveal">桌宠自定义</h1>
        <p class="pet-config__lead reveal" style="--d:.08s">
          住在屏幕边的小家伙，挑一个陪你逛小窝。选好后刷新页面就会换上新装。
        </p>

        <!-- 皮肤选择 -->
        <div class="skin-grid">
          <button class="skin-card reveal" style="--d:.14s" data-skin="cat" type="button">
            <span class="skin-preview skin-preview--cat" aria-hidden="true"></span>
            <h3>暹罗猫</h3>
            <p>奶白身体、蓝眼睛。不会爬墙，但跳得很高，下落时会撑开小降落伞。</p>
            <span class="skin-card__badge">使用中</span>
          </button>
          <button class="skin-card reveal" style="--d:.22s" data-skin="slime" type="button">
            <span class="skin-preview skin-preview--slime" aria-hidden="true"></span>
            <h3>粉色史莱姆</h3>
            <p>软乎乎的粉色果冻。会沿着屏幕边缘爬墙，还能爬上天花板倒挂。</p>
            <span class="skin-card__badge">使用中</span>
          </button>
        </div>

        <!-- 开关 -->
        <div class="pet-settings reveal" style="--d:.3s">
          <label class="pet-settings__row">
            <input type="checkbox" id="petEnable" />
            <span>启用桌宠</span>
          </label>
          <p class="pet-settings__hint">关掉以后所有页面都不会再出现它，随时可以回来打开。</p>
        </div>

        <!-- 互动说明 -->
        <div class="pet-help reveal" style="--d:.38s">
          <h3>怎么和它玩</h3>
          <ul>
            <li><b>点一下</b>：使劲跳得很高——猫会撑降落伞飘下来</li>
            <li><b>拖住甩出去</b>：弹来弹去，摔扁了会自己爬起来</li>
            <li><b>双击</b>：躲起来 8 秒，等它自己出来</li>
            <li><b>45 秒不理它</b>：会站着打瞌睡 💤</li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> 小圣 · 用 ✿ 和一点点代码织成的小窝</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/pet.js"></script>
  <script>
    /* 桌宠设置：选中皮肤 / 开关，写 localStorage 后刷新生效 */
    (function () {
      'use strict';
      var KEY = 'sheng-pet-';
      function get(k, d) {
        try { var v = localStorage.getItem(KEY + k); return v === null ? d : JSON.parse(v); }
        catch (e) { return d; }
      }
      function set(k, v) {
        try { localStorage.setItem(KEY + k, JSON.stringify(v)); } catch (e) {}
      }

      var cards = Array.prototype.slice.call(document.querySelectorAll('.skin-card'));
      var enable = document.getElementById('petEnable');

      function render() {
        var skin = get('skin', 'cat');
        cards.forEach(function (c) {
          c.classList.toggle('is-active', c.getAttribute('data-skin') === skin);
        });
        enable.checked = !get('off', false);
      }

      cards.forEach(function (c) {
        c.addEventListener('click', function () {
          if (c.getAttribute('data-skin') === get('skin', 'cat')) return;
          set('skin', c.getAttribute('data-skin'));
          location.reload();          // 刷新让本页的桌宠也换上新装
        });
      });

      enable.addEventListener('change', function () {
        set('off', !enable.checked);
        location.reload();
      });

      render();
    })();
  </script>
</body>
</html>
