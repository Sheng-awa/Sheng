<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小圣的播放器 ♪</title>
  <meta name="description" content="小圣的小窝里的音乐角——几首轻快的小曲子，随便听。" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/favicon-192.png" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- 飘落的花瓣层（JS 生成，尊重减少动态偏好） -->
  <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>

  <!-- 特效画布：粉色鼠标轨迹 + 飘雪 -->
  <canvas class="fx-canvas" id="fxCanvas" aria-hidden="true"></canvas>

  <!-- 导航（与首页同款侧边栏） -->
  <header class="nav" id="nav">
    <div class="nav__left">
      <div class="nav__header">
        <a class="nav__logo" href="index.html"><span class="nav__logo-mark">✿</span><span class="nav__logo-text">小圣的小窝</span></a>
        <button class="nav__collapse" id="navCollapse" aria-label="收起 / 展开侧边栏" title="收起 / 展开">
          <span class="nav__collapse-icon">«</span>
        </button>
      </div>
      <nav class="nav__links">
        <a href="index.html#likes"><span class="nav__icon">♥</span><span class="nav__text">喜好</span></a>
        <a href="index.html#corner"><span class="nav__icon">✦</span><span class="nav__text">小角落</span></a>
        <a href="index.html#contact"><span class="nav__icon">✉</span><span class="nav__text">联系</span></a>
        <a href="music.html" aria-current="page"><span class="nav__icon">🎵</span><span class="nav__text">音乐</span></a>
      </nav>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="切换明暗主题" title="切换主题">
      <span class="theme-toggle__icon">☾</span>
    </button>
  </header>

  <main class="music-main">
    <section class="section">
      <div class="container">
        <h2 class="section__title reveal">小圣的播放器 ♪</h2>
        <p class="music__lead reveal" style="--d:.1s">
          在首页点一下初音，她头上的 ▶ 也会把你带到这里。<br />
          内置了几首轻快的小曲子，随便听～
        </p>

        <div class="player reveal" style="--d:.2s" id="player">
          <img class="player__disc" src="assets/img/好可爱.jpg" alt="播放器封面" />
          <div class="player__info">
            <h3 id="trackTitle">加载中…</h3>
            <p id="trackArtist">♪</p>
          </div>
          <canvas class="player__viz" id="playerViz" aria-hidden="true"></canvas>
          <div class="player__progress" id="playerProgress" role="slider" aria-label="播放进度">
            <div class="player__progress-bar" id="playerBar"></div>
          </div>
          <div class="player__times">
            <span id="timeCur">0:00</span>
            <span id="timeTotal">0:00</span>
          </div>
          <div class="player__controls">
            <button class="player__btn" id="btnPrev" aria-label="上一首" title="上一首">⏮</button>
            <button class="player__btn player__btn--main" id="btnPlay" aria-label="播放 / 暂停" title="播放 / 暂停">▶</button>
            <button class="player__btn" id="btnNext" aria-label="下一首" title="下一首">⏭</button>
          </div>
          <div class="player__volume">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" aria-label="音量" />
            <span>🔊</span>
          </div>
          <ul class="player__list" id="playerList"></ul>
          <p class="player__credit">
            内置音乐：<a href="https://incompetech.com" target="_blank" rel="noopener">Kevin MacLeod（incompetech.com）</a>，CC BY 4.0 授权<br />
            想听自己的歌？把 mp3 放进 <code>assets/music/</code>，再到 <code>assets/js/music.js</code> 的曲目表里加一行就好
          </p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> 小圣 · 用 ✿ 和一点点代码织成的小窝</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/music.js"></script>
</body>
</html>
