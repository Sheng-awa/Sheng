<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小圣的小窝 ✿</title>
  <meta name="description" content="小圣的个人小角落——软乎乎、慢悠悠、很舒服。" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/favicon-192.png" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- 页面过渡纱幕：进入时粉白淡出；去音乐页时换夜色盖上 -->
  <div class="page-veil page-veil--day page-veil--enter" aria-hidden="true"></div>

  <!-- 飘落的花瓣层（JS 生成，尊重减少动态偏好） -->
  <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>

  <!-- 特效画布：粉色鼠标轨迹 + 飘雪 -->
  <canvas class="fx-canvas" id="fxCanvas" aria-hidden="true"></canvas>

  <!-- 桌宠：像素初音未来，沿底边巡逻（点它冒播放按钮去音乐页、拖拽甩飞、双击躲起来） -->
  <div class="pet" id="pet" data-state="idle" data-surface="floor" aria-hidden="true">
    <div class="pet__rot">
      <div class="pet__flip">
        <canvas class="pet__gl" id="petGL"></canvas>
      </div>
    </div>
    <div class="pet__zzz" id="petZzz" hidden>💤</div>
  </div>

  <!-- 导航（GitHub 风格：左侧 logo + 链接，右侧操作；宽屏为可伸缩侧边栏） -->
  <header class="nav" id="nav">
    <div class="nav__left">
      <div class="nav__header">
        <a class="nav__logo" href="#top"><span class="nav__logo-mark">✿</span><span class="nav__logo-text">小圣的小窝</span></a>
        <button class="nav__collapse" id="navCollapse" aria-label="收起 / 展开侧边栏" title="收起 / 展开">
          <span class="nav__collapse-icon">«</span>
        </button>
      </div>
      <nav class="nav__links">
        <a href="#corner"><span class="nav__icon">✦</span><span class="nav__text">小角落</span></a>
        <a href="#contact"><span class="nav__icon">✉</span><span class="nav__text">联系</span></a>
        <a href="music.html"><span class="nav__icon">🎵</span><span class="nav__text">音乐</span></a>
      </nav>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="切换明暗主题" title="切换主题">
      <span class="theme-toggle__icon">☾</span>
    </button>
  </header>

  <main id="top">
    <!-- Hero -->
    <section class="hero">
      <div class="hero__inner">
        <div class="hero__avatar-row reveal">
          <div class="hero__avatar-wrap">
            <div class="hero__avatar-ring"></div>
            <img class="hero__avatar" id="avatar" src="assets/img/avatar.jpg" alt="小圣的头像" title="点我有惊喜 ✿" />
          </div>
          <button class="quote" id="quoteBtn" type="button" title="点我换一句 ✿" aria-label="换一句名言">
            <span class="quote__text" id="quoteText">慢慢来，谁还没有一个努力的过程。</span>
            <span class="quote__author" id="quoteAuthor">—— 佚名</span>
            <span class="quote__hint">⇄ 点我换一句</span>
          </button>
        </div>
        <h1 class="hero__title reveal" style="--d:.12s">你好呀，我是<span class="hero__name">小圣</span></h1>
        <p class="hero__subtitle reveal" style="--d:.24s">男娘一枚，正在慢慢成为自己喜欢的样子 ✿</p>
        <p class="hero__weather reveal" style="--d:.36s">
          <span>📍 江西南昌</span>
          <span class="hero__weather-dot">·</span>
          <span id="weatherText">正在获取天气…</span>
        </p>
        <div class="hero__actions reveal" style="--d:.48s">
          <a class="btn btn--ghost" href="#contact">来找我玩</a>
        </div>
      </div>
      <a class="hero__scroll-hint" href="#corner" aria-label="向下滚动">
        <span></span>
      </a>
    </section>

    <!-- 小角落（占位，以后慢慢加东西） -->
    <section class="section" id="corner">
      <div class="container">
        <h2 class="section__title reveal">小角落</h2>
        <div class="corner__card reveal" style="--d:.1s">
          <div class="corner__wip">🚧</div>
          <h3>在建中，慢慢来</h3>
          <p>
            这里以后会长出各种各样的东西：可能是博客、相册、小工具，也可能是日记本。<br />
            随便折腾，不着急。
          </p>
        </div>
      </div>
    </section>

    <!-- 联系 -->
    <section class="section section--alt" id="contact">
      <div class="container">
        <h2 class="section__title reveal">来找我玩</h2>
        <div class="contact__list reveal" style="--d:.1s">
          <a class="contact__item" href="https://github.com/Sheng-awa" target="_blank" rel="noopener">
            <span class="contact__icon">⌥</span>
            <span class="contact__label">GitHub</span>
            <span class="contact__value">@Sheng-awa</span>
          </a>
          <a class="contact__item" href="mailto:ShengQwQ@outlook.com">
            <span class="contact__icon">✉</span>
            <span class="contact__label">邮箱</span>
            <span class="contact__value">ShengQwQ@outlook.com</span>
          </a>
          <a class="contact__item" href="https://sheng-awa.top" target="_blank" rel="noopener">
            <span class="contact__icon">✿</span>
            <span class="contact__label">小窝</span>
            <span class="contact__value">sheng-awa.top</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> 小圣 · 用 ✿ 和一点点代码织成的小窝</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/pet.js"></script>
</body>
</html>
